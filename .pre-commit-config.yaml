repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: mixed-line-ending

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v17.0.6
    hooks:
      - id: clang-format
        types_or: [c++, c]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.41.0
    hooks:
      - id: markdownlint
        # Lints all *.md docs in the repo. Config: .markdownlint.yaml.
        args: ["--config", ".markdownlint.yaml"]

  - repo: local
    hooks:
      - id: forbid-or-true
        name: "forbid silent-failure workaround in shell/YAML/Dockerfile/justfile/HCL"
        description: >
          Rejects the `or-true` idiom (and its whitespace variants) in shell,
          YAML, Dockerfile, justfile, and HCL sources. Refactor to an explicit
          `if`-guard, a real conditional, or a documented `set +e`/`set -e`
          bracket. See HomericIntelligence/Odysseus#280.
        language: pygrep
        entry: '\|\|\s*true(\s*$|\s+#)'
        files: \.(sh|bash|yml|yaml|hcl)$|(^|/)Dockerfile[^/]*$|(^|/)[Jj]ustfile$
        types: [text]
        pass_filenames: true

      - id: forbid-continue-on-error
        name: "forbid continue-on-error workflow opt-out"
        description: >
          GitHub Actions `continue-on-error true` (truthy form) hides real CI
          failures. Fix the underlying job/step instead.
        language: pygrep
        entry: '^\s*continue-on-error:\s*true\s*$'
        files: ^\.github/workflows/.*\.ya?ml$
        pass_filenames: true

      - id: check-action-pins
        name: "verify all GitHub Action uses: are SHA-pinned"
        description: >
          Every `uses: owner/repo@<ref>` in `.github/workflows/` and
          `.github/actions/` must reference an immutable 40-char commit SHA
          with a trailing `# v<tag>` comment. See #65.
        language: system
        entry: ./scripts/check-action-pins.sh
        files: ^\.github/(workflows|actions)/.*\.ya?ml$
        pass_filenames: false

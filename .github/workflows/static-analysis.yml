name: Static Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  clang-format:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install clang-format
        run: sudo apt-get install -y clang-format
      - name: Check formatting
        run: ./scripts/format.sh --check

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang clang-tidy python3-pip
          pip3 install --user conan
      - name: Install Conan dependencies
        uses: ./.github/actions/conan-install
        with:
          build_type: debug
          compiler: clang
      - name: Configure
        run: CC=clang CXX=clang++ cmake --preset debug -DProjectCharybdis_ENABLE_CLANG_TIDY=ON
      - name: Build
        run: cmake --build --preset debug

  check-all:
    name: All Static Analysis Checks
    runs-on: ubuntu-24.04
    needs: [clang-format, clang-tidy]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.clang-format.result }}" != "success" ] || \
             [ "${{ needs.clang-tidy.result }}" != "success" ]; then
            echo "Static analysis failed"; exit 1
          fi
          echo "All checks passed"

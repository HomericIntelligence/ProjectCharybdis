name: Required Checks

on:
  workflow_run:
    workflows: ["Build and Test", "Static Analysis", "Code Coverage", "CodeQL SAST", "Sanitizers", "Lock Check", "Container Build and Publish", "Integration Tests"]
    types: [completed]
  pull_request:
    branches: [main]
  push:
    branches: [main]

# No concurrency cancellation for workflow_run events — they must always
# report a result so the branch ruleset check contexts are populated.
concurrency:
  group: required-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Fan-in jobs: reflect the result of upstream workflows
  # ---------------------------------------------------------------------------

  build:
    name: build
    runs-on: ubuntu-24.04
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow.name == 'Build and Test'
    steps:
      - name: Check Build and Test result
        if: github.event_name == 'workflow_run'
        env:
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          if [ "${CONCLUSION}" != "success" ]; then
            echo "Build and Test workflow failed with: ${CONCLUSION}"
            exit 1
          fi
          echo "Build and Test passed"
      - name: Skip (not triggered by this workflow)
        if: github.event_name != 'workflow_run'
        run: echo "Not a workflow_run event — pass (actual work done by Build and Test workflow)"

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-24.04
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow.name == 'Build and Test'
    steps:
      - name: Check Build and Test result
        if: github.event_name == 'workflow_run'
        env:
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          if [ "${CONCLUSION}" != "success" ]; then
            echo "Build and Test workflow failed with: ${CONCLUSION}"
            exit 1
          fi
          echo "Build and Test passed"
      - name: Skip (not triggered by this workflow)
        if: github.event_name != 'workflow_run'
        run: echo "Not a workflow_run event — pass (actual work done by Build and Test workflow)"

  integration-tests:
    name: integration-tests
    runs-on: ubuntu-24.04
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow.name == 'Integration Tests'
    steps:
      - name: Check Integration Tests result
        if: github.event_name == 'workflow_run'
        env:
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          if [ "${CONCLUSION}" != "success" ]; then
            echo "Integration Tests workflow failed with: ${CONCLUSION}"
            exit 1
          fi
          echo "Integration Tests passed"
      - name: Skip (not triggered by this workflow)
        if: github.event_name != 'workflow_run'
        run: echo "Not a workflow_run event — pass (actual work done by Integration Tests workflow)"

  lint:
    name: lint
    runs-on: ubuntu-24.04
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow.name == 'Static Analysis'
    steps:
      - name: Check Static Analysis result
        if: github.event_name == 'workflow_run'
        env:
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          if [ "${CONCLUSION}" != "success" ]; then
            echo "Static Analysis workflow failed with: ${CONCLUSION}"
            exit 1
          fi
          echo "Static Analysis passed"
      - name: Skip (not triggered by this workflow)
        if: github.event_name != 'workflow_run'
        run: echo "Not a workflow_run event — pass (actual work done by Static Analysis workflow)"

  security-codeql:
    name: security/codeql
    runs-on: ubuntu-24.04
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow.name == 'CodeQL SAST'
    steps:
      - name: Check CodeQL SAST result
        if: github.event_name == 'workflow_run'
        env:
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          if [ "${CONCLUSION}" != "success" ]; then
            echo "CodeQL SAST workflow failed with: ${CONCLUSION}"
            exit 1
          fi
          echo "CodeQL SAST passed"
      - name: Skip (not triggered by this workflow)
        if: github.event_name != 'workflow_run'
        run: echo "Not a workflow_run event — pass (actual work done by CodeQL SAST workflow)"

  sanitizers:
    name: sanitizers
    runs-on: ubuntu-24.04
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow.name == 'Sanitizers'
    steps:
      - name: Check Sanitizers result
        if: github.event_name == 'workflow_run'
        env:
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          if [ "${CONCLUSION}" != "success" ]; then
            echo "Sanitizers workflow failed with: ${CONCLUSION}"
            exit 1
          fi
          echo "Sanitizers passed"
      - name: Skip (not triggered by this workflow)
        if: github.event_name != 'workflow_run'
        run: echo "Not a workflow_run event — pass (actual work done by Sanitizers workflow)"

  pixi-lock-check:
    name: pixi-lock-check
    runs-on: ubuntu-24.04
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow.name == 'Lock Check'
    steps:
      - name: Check Lock Check result
        if: github.event_name == 'workflow_run'
        env:
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          if [ "${CONCLUSION}" != "success" ]; then
            echo "Lock Check workflow failed with: ${CONCLUSION}"
            exit 1
          fi
          echo "Lock Check passed"
      - name: Skip (not triggered by this workflow)
        if: github.event_name != 'workflow_run'
        run: echo "Not a workflow_run event — pass (actual work done by Lock Check workflow)"

  docker-build:
    name: docker-build
    runs-on: ubuntu-24.04
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow.name == 'Container Build and Publish'
    steps:
      - name: Check Container Build and Publish result
        if: github.event_name == 'workflow_run'
        env:
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          if [ "${CONCLUSION}" != "success" ]; then
            echo "Container Build and Publish workflow failed with: ${CONCLUSION}"
            exit 1
          fi
          echo "Container Build and Publish passed"
      - name: Skip (not triggered by this workflow)
        if: github.event_name != 'workflow_run'
        run: echo "Not a workflow_run event — pass (actual work done by Container Build and Publish workflow)"

  # ---------------------------------------------------------------------------
  # Independent jobs: run directly on push/pull_request
  # These are skipped when triggered by workflow_run (they don't depend on
  # any upstream workflow result).
  # ---------------------------------------------------------------------------

  forbid-suppressions:
    name: forbid-suppressions
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: "Reject silent-failure workaround in shell/YAML/Dockerfile/justfile/HCL"
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files \
            -- \
            '*.sh' '*.bash' '*.yml' '*.yaml' '*.hcl' \
            'Dockerfile*' '**/Dockerfile*' \
            'justfile' '**/justfile' 'Justfile' '**/Justfile')
          declare -a scan_files=()
          for f in "${files[@]}"; do
            case "$f" in
              # Exempt this workflow file (heredoc would otherwise self-match)
              .github/workflows/_required.yml) continue ;;
              # Exempt any runbook that documents the rule (if present)
              docs/runbooks/no-silent-failures.md) continue ;;
            esac
            scan_files+=("$f")
          done
          if [ "${#scan_files[@]}" -eq 0 ]; then
            echo "No files to scan"
            exit 0
          fi
          if grep -nE '\|\|[[:space:]]*true([[:space:]]*$|[[:space:]]+#)' "${scan_files[@]}"; then
            echo ""
            echo '::error::Found silent-failure workarounds above. Refactor per HomericIntelligence/Odysseus#280.'
            exit 1
          fi
          echo 'OK: no silent-failure workarounds found'

      - name: "Reject continue-on-error workflow opt-out"
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files -- '.github/workflows/*.yml' '.github/workflows/*.yaml')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No workflow files"
            exit 0
          fi
          if grep -nE '^[[:space:]]*continue-on-error:[[:space:]]*true[[:space:]]*$' "${files[@]}"; then
            echo ""
            echo '::error::Found "continue-on-error: true" above. Fix the root cause per HomericIntelligence/Odysseus#280.'
            exit 1
          fi
          echo 'OK: no "continue-on-error: true" found'

  security-dependency-scan:
    name: security/dependency-scan
    runs-on: ubuntu-24.04
    if: github.event_name != 'workflow_run'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH
      # Note: Conan's `audit` subcommand requires authentication against
      # audit.conan.io and is run as a separate, opt-in step locally (see
      # docs). Trivy (above) already scans `conan.lock` for CVEs against its
      # offline DB, providing CI-time coverage without external credentials.

  security-secrets-scan:
    name: security/secrets-scan
    runs-on: ubuntu-24.04
    if: github.event_name != 'workflow_run'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - name: Detect secrets
        run: |
          set -euo pipefail
          # Extract gitleaks into a tmpdir outside the source tree so the
          # tarball's own README.md (which documents a sample sidekiq secret)
          # does not pollute the scan target.
          GITLEAKS_DIR="$(mktemp -d)"
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar xz -C "${GITLEAKS_DIR}"
          "${GITLEAKS_DIR}/gitleaks" detect --source . --redact --no-git

  schema-validation:
    name: schema-validation
    runs-on: ubuntu-24.04
    if: github.event_name != 'workflow_run'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install check-jsonschema
        run: pip3 install --user check-jsonschema
      - name: Validate workflow schemas
        run: |
          ~/.local/bin/check-jsonschema --builtin-schema vendor.github-workflows .github/workflows/*.yml

  deps-version-sync:
    name: deps/version-sync
    runs-on: ubuntu-24.04
    if: github.event_name != 'workflow_run'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Parse VERSION from CMakeLists.txt
        run: |
          VERSION=$(grep -A5 'project(' CMakeLists.txt \
            | grep -oP '\d+\.\d+\.\d+' | head -1)
          if [ -z "${VERSION}" ]; then
            echo "ERROR: Could not parse VERSION from CMakeLists.txt"
            exit 1
          fi
          echo "Detected project version: ${VERSION}"
          echo "PROJECT_VERSION=${VERSION}" >> "${GITHUB_ENV}"
      - name: Verify pixi.toml version matches (if present)
        run: |
          if [ -f pixi.toml ]; then
            PIXI_VERSION=$(grep -m1 '^version' pixi.toml \
              | grep -oP '\d+\.\d+\.\d+' | head -1)
            if [ -n "${PIXI_VERSION}" ] && [ "${PIXI_VERSION}" != "${PROJECT_VERSION}" ]; then
              echo "ERROR: pixi.toml version (${PIXI_VERSION}) does not match CMakeLists.txt (${PROJECT_VERSION})"
              exit 1
            fi
            echo "pixi.toml version ${PIXI_VERSION:-N/A} consistent with CMakeLists.txt ${PROJECT_VERSION}"
          else
            echo "No pixi.toml found, skipping cross-check"
          fi
      - name: Verify conanfile.py version matches (if present)
        run: |
          if [ -f conanfile.py ]; then
            CONAN_VERSION=$(grep -m1 '^\s*version\s*=' conanfile.py \
              | grep -oP '\d+\.\d+\.\d+' | head -1)
            if [ -n "${CONAN_VERSION}" ] && [ "${CONAN_VERSION}" != "${PROJECT_VERSION}" ]; then
              echo "ERROR: conanfile.py version (${CONAN_VERSION}) does not match CMakeLists.txt (${PROJECT_VERSION})"
              exit 1
            fi
            echo "conanfile.py version ${CONAN_VERSION:-N/A} consistent with CMakeLists.txt ${PROJECT_VERSION}"
          else
            echo "No conanfile.py found, skipping cross-check"
          fi

  typecheck:
    name: typecheck
    runs-on: ubuntu-24.04
    if: github.event_name != 'workflow_run'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang clang-tidy python3-pip
          pip3 install --user conan
      - name: Install Conan dependencies
        uses: ./.github/actions/conan-install
        with:
          build_type: debug
          compiler: clang
      - name: Configure with clang-tidy enabled
        run: CC=clang CXX=clang++ cmake --preset debug -DProjectCharybdis_ENABLE_CLANG_TIDY=ON
      - name: Build (clang-tidy runs as part of build)
        run: cmake --build --preset debug

  lockfile-integrity:
    name: lockfile-integrity
    runs-on: ubuntu-24.04
    if: github.event_name != 'workflow_run'
    steps:
      - uses: actions/checkout@v6
      - name: Install Conan
        run: pip3 install --user conan
      - name: Configure Conan profile
        run: conan profile detect --force
      - name: Regenerate lockfile
        run: |
          conan lock create . \
            -s compiler=gcc \
            -s compiler.version=14 \
            -s compiler.libcxx=libstdc++11 \
            -s compiler.cppstd=20 \
            -s build_type=Debug \
            -s os=Linux \
            -s arch=x86_64
      - name: Verify lockfile is up-to-date
        run: |
          if ! git diff --exit-code conan.lock; then
            echo "ERROR: conan.lock is out of date. Run scripts/lock.sh locally and commit the result."
            exit 1
          fi
          echo "conan.lock is up-to-date"

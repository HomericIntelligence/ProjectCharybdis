name: Lock Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pixi-lock-check:
    name: pixi/lock-check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.63.2
      - name: Verify lockfile is up-to-date
        run: pixi install --locked

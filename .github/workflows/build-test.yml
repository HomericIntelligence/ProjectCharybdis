name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: ${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        compiler: [gcc, clang]
        build_type: [debug, release]
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        env:
          COMPILER: ${{ matrix.compiler }}
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build python3-pip
          if [ "${COMPILER}" = "clang" ]; then
            sudo apt-get install -y clang
          fi
          pip3 install --user conan
      - name: Configure Conan
        run: conan profile detect --force
      - name: Install Conan dependencies
        env:
          COMPILER: ${{ matrix.compiler }}
          BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          BUILD_TYPE_CAP=$(echo "${BUILD_TYPE}" | awk '{print toupper(substr($0,1,1)) tolower(substr($0,2))}')
          if [ "${COMPILER}" = "clang" ]; then
            CC=clang CXX=clang++ conan install . \
              --output-folder="build/${BUILD_TYPE}" \
              --build=missing \
              -s build_type="${BUILD_TYPE_CAP}" \
              -s compiler=clang \
              -s compiler.version=18 \
              -s compiler.libcxx=libstdc++11 \
              -s compiler.cppstd=20
          else
            conan install . \
              --output-folder="build/${BUILD_TYPE}" \
              --build=missing \
              -s build_type="${BUILD_TYPE_CAP}" \
              -s compiler=gcc \
              -s compiler.version=14 \
              -s compiler.libcxx=libstdc++11 \
              -s compiler.cppstd=20
          fi
      - name: Configure
        env:
          COMPILER: ${{ matrix.compiler }}
          BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          if [ "${COMPILER}" = "clang" ]; then
            export CC=clang CXX=clang++
          fi
          cmake --preset "${BUILD_TYPE}"
      - name: Build
        env:
          BUILD_TYPE: ${{ matrix.build_type }}
        run: cmake --build --preset "${BUILD_TYPE}"
      - name: Test
        env:
          BUILD_TYPE: ${{ matrix.build_type }}
        run: ctest --preset "${BUILD_TYPE}"

  check-all:
    name: All Build/Test Checks
    runs-on: ubuntu-24.04
    needs: [build-test]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.build-test.result }}" != "success" ]; then
            echo "build-test failed"; exit 1
          fi
          echo "All checks passed"

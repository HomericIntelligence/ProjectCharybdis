name: Code Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build gcovr python3-pip
          pip3 install --user conan
      - name: Configure Conan
        run: conan profile detect --force
      - name: Install Conan dependencies
        run: |
          conan install . \
            --output-folder=build/coverage \
            --build=missing \
            -s build_type=Debug \
            -s compiler=gcc \
            -s compiler.version=14 \
            -s compiler.libcxx=libstdc++11 \
            -s compiler.cppstd=20
      - name: Configure
        run: cmake --preset coverage
      - name: Build
        run: cmake --build --preset coverage
      - name: Test
        run: ctest --preset coverage
      - name: Generate coverage report
        run: ./scripts/coverage.sh
      - name: Check threshold
        run: |
          LINE_COV=$(gcovr --print-summary 2>/dev/null | grep "lines:" | grep -oP '\d+\.\d+' | head -1)
          python3 -c "import sys; cov=float('${LINE_COV}'); sys.exit(0 if cov >= 80 else 1)"

  check-all:
    name: All Coverage Checks
    runs-on: ubuntu-24.04
    needs: [coverage]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.coverage.result }}" != "success" ]; then
            echo "Coverage check failed"; exit 1
          fi
          echo "All checks passed"

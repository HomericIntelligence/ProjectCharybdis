name: Code Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build gcovr python3-pip
          pip3 install --user conan
      - name: Install Conan dependencies
        uses: ./.github/actions/conan-install
        with:
          build_type: debug
          compiler: gcc
          output_folder: build/coverage
      - name: Configure
        run: cmake --preset coverage
      - name: Build
        run: cmake --build --preset coverage
      - name: Test
        run: ctest --preset coverage
      - name: Generate coverage report
        run: ./scripts/coverage.sh
      - name: Check threshold
        run: |
          LINE_COV=$(gcovr \
            --root . \
            --filter include \
            --filter src \
            --print-summary \
            build/coverage 2>/dev/null | grep "lines:" | grep -oP '\d+\.\d+' | head -1)
          echo "Line coverage: ${LINE_COV:-0}%"
          python3 -c "import sys; cov=float('${LINE_COV:-0}'); sys.exit(0 if cov >= 80 else 1)"

  check-all:
    name: All Coverage Checks
    runs-on: ubuntu-24.04
    needs: [coverage]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.coverage.result }}" != "success" ]; then
            echo "Coverage check failed"; exit 1
          fi
          echo "All checks passed"
